name: Publish Maven snapshot

'on':
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-maven-snapshot
  cancel-in-progress: false

jobs:
  publish:
    name: Publish JVM Maven snapshot artefacts
    if: github.repository == 'Kreoh/kroog' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Configure Git
        run: git config --global core.autocrlf input

      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Verify Central Portal credentials
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: |
          if [[ -z "$CENTRAL_PORTAL_USERNAME" ]]; then
            echo "CENTRAL_PORTAL_USERNAME is required but is not set." >&2
            exit 1
          fi
          if [[ -z "$CENTRAL_PORTAL_PASSWORD" ]]; then
            echo "CENTRAL_PORTAL_PASSWORD is required but is not set." >&2
            exit 1
          fi

      - name: Publish JVM Maven snapshot artefacts
        env:
          ORG_GRADLE_PROJECT_centralPortalSnapshotsUsername: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          ORG_GRADLE_PROJECT_centralPortalSnapshotsPassword: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: |
          ./gradlew \
            publishJvmPublicationToCentralPortalSnapshotsRepository \
            publishMavenPublicationToCentralPortalSnapshotsRepository \
            -PpublishCentralSnapshots=true \
            --parallel \
            --no-daemon \
            --stacktrace
